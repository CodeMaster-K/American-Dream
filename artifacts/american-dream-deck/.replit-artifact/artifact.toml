kind = "web"
previewPath = "/"
title = "American Dream Sales Deck"
version = "1.0.0"
id = "artifacts/american-dream-deck"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25709

[services.development]
run = "pnpm --filter @workspace/american-dream-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/american-dream-deck", "run", "build" ]
publicDir = "artifacts/american-dream-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25709"
BASE_PATH = "/"
